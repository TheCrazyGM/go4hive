{% extends "gopher/base.html" %}
{% load static %}

{% block content %}
    <div id="editor-container" style="display: flex; flex-direction: column; height: 80vh;">
        <div id="editor-status" style="border-bottom: 1px solid var(--dim-color); padding-bottom: 5px; margin-bottom: 10px;">
        <pre style="margin: 0;">GO4HIVE v0.2.0 - [NEW POST] - STATUS: <span id="buffer-status">READY</span></pre>
            <div style="margin-top: 10px; display: flex; align-items: center;">
                <label style="color: var(--dim-color); width: 70px; display: inline-block;">TITLE:</label>
                <input type="text" id="post-title" style="background: transparent; border: none; border-bottom: 1px dashed var(--dim-color); color: var(--text-color); font-family: var(--font-family); flex-grow: 1; padding: 2px 5px; outline: none;" placeholder="Enter post title..." autofocus>
            </div>
            <div style="margin-top: 5px; display: flex; align-items: center;">
                <label style="color: var(--dim-color); width: 70px; display: inline-block;">TAGS:</label>
                <input type="text" id="post-tags" style="background: transparent; border: none; border-bottom: 1px dashed var(--dim-color); color: var(--text-color); font-family: var(--font-family); flex-grow: 1; padding: 2px 5px; outline: none;" value="{{ initial_tag }}" placeholder="e.g. hive gaming blog (space separated)">
            </div>
        </div>

        <textarea id="post-body" style="flex-grow: 1; background: transparent; border: none; color: var(--text-color); font-family: var(--font-family); font-size: 1.1em; padding: 0; outline: none; resize: none;" placeholder="Type your story here..."></textarea>

        <div id="editor-shortcuts" style="margin-top: 15px; background-color: var(--text-color); color: var(--bg-color); padding: 2px 10px; font-size: 0.9em;">
        <pre style="margin: 0; color: inherit; background: inherit;">^O BROADCAST (Save)   ^X DISCARD & EXIT   ^K CLEAR   ^G HELP</pre>
        </div>
    </div>

<!-- Editor Specific Logic -->
    <script src="{% static 'gopher/js/editor.js' %}"></script>
{% endblock %}
